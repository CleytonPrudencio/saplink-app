services:
  postgres:
    image: postgres:16-alpine
    container_name: saplink-db
    environment:
      POSTGRES_DB: saplink
      POSTGRES_USER: saplink
      POSTGRES_PASSWORD: saplink123
    ports:
      - "5433:5432"
    volumes:
      - saplink_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saplink -d saplink"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    container_name: saplink-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  backend:
    build:
      context: ./backend
    container_name: saplink-backend
    environment:
      DATABASE_URL: "postgresql://saplink:saplink123@postgres:5432/saplink"
      JWT_SECRET: "saplink-jwt-secret-2026-super-seguro"
      ENCRYPTION_KEY: "saplink-encryption-key-2026-troque-em-producao"
      ANTHROPIC_API_KEY: ""
      # IA local grátis via Ollama (deixe OLLAMA_URL vazio para usar Claude/mock)
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "qwen2.5:7b"
      # Web Push (PWA) — chaves VAPID em /opt/saplink/.env
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_SUBJECT: "${VAPID_SUBJECT:-mailto:ops@saplink.com.br}"
      PORT: "8080"
      SIMULATION_ENABLED: "${SIMULATION_ENABLED:-false}"
      SIMULATION_INTERVAL: "30000"
      SEED_DEMO: "${SEED_DEMO:-false}"
      BILLING_WEBHOOK_SECRET: "dev-billing-webhook-secret"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3000}"
      # Pagamento (Stripe — preferencial)
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      # Pagamento (Asaas — alternativa)
      ASAAS_API_URL: "${ASAAS_API_URL:-https://sandbox.asaas.com/api/v3}"
      ASAAS_API_KEY: "${ASAAS_API_KEY:-}"
      ASAAS_WEBHOOK_TOKEN: "${ASAAS_WEBHOOK_TOKEN:-}"
      # E-mail (Resend)
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      RESEND_FROM: "${RESEND_FROM:-SAPLINK <onboarding@resend.dev>}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: saplink-frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  saplink_data:
  ollama_models:
