version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: saplink-db
    environment:
      POSTGRES_DB: saplink
      POSTGRES_USER: saplink
      POSTGRES_PASSWORD: saplink123
    ports:
      - "5433:5432"
    volumes:
      - saplink_data:/var/lib/postgresql/data

volumes:
  saplink_data:
